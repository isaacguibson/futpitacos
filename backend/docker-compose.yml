services:
  futpitacos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futpitacos-api
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - futpitacos-network

networks:
  futpitacos-network:
    driver: bridge


